<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BEATKONDUCTAZ | Golden Era</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter,sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

.bg{
  position:fixed;
  inset:0;
  background:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
  filter:brightness(0.25);
  z-index:-2;
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,rgba(0,0,0,0.4),rgba(0,0,0,0.95));
  z-index:-1;
}

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  z-index:10;
}

nav h1{
  font-family:"Bebas Neue";
  color:#e10600;
  letter-spacing:2px;
}

nav a{
  color:#fff;
  margin-left:15px;
  text-decoration:none;
  font-size:13px;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-family:"Bebas Neue";
  font-size:4rem;
}

.hero h2{
  color:#e10600;
  margin-top:10px;
}

.hero p{
  margin-top:15px;
  padding:10px 15px;
  border-left:3px solid #e10600;
  background:rgba(0,0,0,0.6);
}

section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.title{
  font-family:"Bebas Neue";
  font-size:2rem;
  border-left:4px solid #e10600;
  padding-left:10px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  text-align:center;
  border:1px solid #222;
}

.card:hover{
  border-color:#e10600;
}

/
